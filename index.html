<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saddem Dhriffa | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  /* Editorial Palette - Pulled from your photo's jacket/skin tones */
  --bg: #F2EDE9; 
  --soft-accent: #E5DED8;
  --text-main: #2D2A26;
  --text-muted: #8C857E;
  --accent-gold: #B5A48B; /* Subtle hover color */
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-color: var(--bg);
  color: var(--text-main);
  overflow-x: hidden;
}

/* --- NAVIGATION --- */
/* Desktop: Minimalist Side Rail */
.side-nav {
  position: fixed;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 100;
}

.side-nav a {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-decoration: none;
  color: var(--text-muted);
  writing-mode: vertical-rl; /* Vertical text for a boutique feel */
  transform: rotate(180deg);
  transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

.side-nav a:hover {
  color: var(--text-main);
  transform: rotate(180deg) translateY(5px);
}

/* Mobile: Top Clean Bar */
.mobile-nav {
  display: none;
  position: fixed;
  top: 0; width: 100%;
  padding: 20px;
  background: rgba(242, 237, 233, 0.9);
  backdrop-filter: blur(10px);
  justify-content: space-around;
  z-index: 1000;
  border-bottom: 1px solid var(--soft-accent);
}

.mobile-nav a { text-decoration: none; color: var(--text-muted); font-size: 12px; font-weight: 500; }

/* --- HERO LAYOUT --- */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 100vh;
  padding: 0 10% 0 15%; /* Extra left padding for the side-nav */
  max-width: 1600px;
  margin: 0 auto;
}

.content {
  flex: 1;
  max-width: 500px;
  opacity: 0; /* For a soft entrance animation */
  animation: fadeIn 1.2s ease forwards 0.3s;
}

h1 {
  font-size: clamp(48px, 6vw, 84px);
  line-height: 0.95;
  font-weight: 400;
  margin: 0 0 20px 0;
  letter-spacing: -0.03em;
}

.subtitle {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-bottom: 24px;
  display: block;
}

.description {
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-main);
  margin-bottom: 40px;
  font-weight: 300;
}

.cta {
  padding: 14px 32px;
  border-radius: 50px;
  border: 1px solid var(--text-main);
  background: transparent;
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.4s;
}

.cta:hover {
  background: var(--text-main);
  color: #fff;
  transform: translateY(-2px);
}

/* --- IMAGE SECTION --- */
.image-container {
  flex: 1;
  display: flex;
  justify-content: flex-end;
  position: relative;
}

/* The 'Arch' Shape & Glow */
.image-wrapper {
  position: relative;
  width: 100%;
  max-width: 450px;
  aspect-ratio: 4/5;
  border-radius: 220px 220px 30px 30px; /* Editorial Arch */
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.08);
}

.image-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.8s ease;
}

.image-wrapper:hover img {
  transform: scale(1.03);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- RESPONSIVE --- */
@media (max-width: 900px) {
  .side-nav { display: none; }
  .mobile-nav { display: flex; }
  
  .hero {
    flex-direction: column-reverse;
    padding: 120px 24px 60px 24px;
    text-align: center;
    gap: 50px;
  }
  
  .image-wrapper {
    max-width: 300px;
    border-radius: 150px 150px 20px 20px;
  }
}
</style>
</head>

<body>

<nav class="mobile-nav">
  <a href="#">About</a>
  <a href="#">Skills</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</nav>

<div class="side-nav">
  <a href="#">About</a>
  <a href="#">Skills</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<section class="hero">
  <div class="content">
    <span class="subtitle">WordPress Backend Developer</span>
    <h1>Saddem<br>Dhriffa</h1>
    <p class="description">
      Specializing in bespoke plugin architecture and high-performance backend systems for the modern web.
    </p>
    <button class="cta">Get in Touch</button>
  </div>

  <div class="image-container">
    <div class="image-wrapper">
      <img src="assets/profile.jpg" alt="Saddem Dhriffa">
    </div>
  </div>
</section>

</body>
</html>
