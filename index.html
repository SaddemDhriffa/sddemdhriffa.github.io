<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saddem Dhriffa</title>

<style>
:root {
  --bg: #EAE4DE;
  --soft: #D9D3CE;
  --muted: #BFB7B0;
  --dark: #3A3A3A;
  --black: #0F0F0F;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--dark);
}

/* HERO LAYOUT */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 60px;
  gap: 40px;
}

/* LEFT CONTENT */
.content {
  max-width: 520px;
  z-index: 2;
}

h1 {
  font-size: 64px;
  line-height: 1.1;
  margin: 0;
  color: var(--black);
}

.subtitle {
  margin: 20px 0;
  color: var(--muted);
  font-size: 18px;
}

.description {
  font-size: 15px;
  margin-bottom: 30px;
}

button {
  padding: 12px 26px;
  border-radius: 30px;
  border: 1px solid var(--muted);
  background: transparent;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background: var(--black);
  color: white;
}

/* RIGHT IMAGE */
.image-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* soft background glow */
.image-container::before {
  content: "";
  position: absolute;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, #e6dfd8 0%, transparent 70%);
  border-radius: 50%;
  z-index: 0;
}

/* IMAGE STYLE */
.image-container img {
  position: relative;
  z-index: 1;
  width: 360px;
  height: 480px;
  object-fit: cover;
  object-position: top center;
  border-radius: 24px;
  filter: contrast(1.05) saturate(0.95);
}

/* VERTICAL MENU */
.menu {
  position: fixed;
  left: 25px;
  top: 50%;
  transform: translateY(-50%);
}

.menu a {
  display: block;
  margin: 14px 0;
  text-decoration: none;
  color: var(--muted);
  transition: 0.3s;
  font-size: 14px;
}

.menu a:hover {
  color: var(--black);
  transform: translateX(6px);
}

/* MOBILE */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
    justify-content: center;
    text-align: center;
    height: auto;
    padding: 40px 20px;
  }

  .menu {
    display: none;
  }

  h1 {
    font-size: 40px;
  }

  .image-container {
    margin-top: 30px;
  }

  .image-container::before {
    width: 280px;
    height: 280px;
  }

  .image-container img {
    width: 260px;
    height: 340px;
    object-position: top;
  }
}
</style>
</head>

<body>

<!-- VERTICAL MENU -->
<div class="menu">
  <a href="#">About</a>
  <a href="#">Skills</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<!-- HERO -->
<section class="hero">

  <!-- TEXT -->
  <div class="content">
    <h1>Saddem<br>Dhriffa</h1>
    <p class="subtitle">WordPress Backend Developer</p>
    <p class="description">
      Building custom plugins and scalable solutions for modern web platforms.
    </p>
    <button>Contact Me</button>
  </div>

  <!-- IMAGE -->
  <div class="image-container">
    <img src="assets/profile.jpg" alt="Saddem Dhriffa">
  </div>

</section>

</body>
</html>
