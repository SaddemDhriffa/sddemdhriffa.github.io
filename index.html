<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saddem Portfolio</title>

<style>
:root {
  --bg: #F2EDE8;
  --soft: #D9D3CE;
  --muted: #BFB7B0;
  --dark: #3A3A3A;
  --black: #0F0F0F;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--dark);
}

/* Layout */
.hero {
  display: flex;
  height: 100vh;
  align-items: center;
  padding: 40px;
}

/* Vertical menu */
.menu {
  position: fixed;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
}

.menu a {
  display: block;
  margin: 15px 0;
  text-decoration: none;
  color: var(--muted);
  transition: 0.3s;
}

.menu a:hover {
  color: var(--black);
  transform: translateX(5px);
}

/* Content */
.content {
  max-width: 500px;
}

h1 {
  font-size: 60px;
  margin: 0;
}

.subtitle {
  margin: 15px 0;
  color: var(--muted);
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  border: 1px solid var(--muted);
  background: transparent;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: var(--black);
  color: white;
}

/* Image */
.image {
  flex: 1;
  display: flex;
  justify-content: center;
}

.image img {
  width: 350px;
  border-radius: 20px;
  filter: grayscale(10%);
}

/* Mobile */
@media(max-width: 768px) {
  .hero {
    flex-direction: column;
    text-align: center;
  }

  .menu {
    display: none;
  }

  h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<div class="menu">
  <a href="#">About</a>
  <a href="#">Skills</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<section class="hero">
  
  <div class="content">
    <h1>Saddem Dhriffa</h1>
    <p class="subtitle">WordPress Backend Developer</p>
    <p>Building scalable and custom solutions for modern web platforms.</p>
    <button>Contact Me</button>
  </div>

  <div class="image">
    <img src="your-image.jpg" alt="Saddem">
  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
gsap.from(".content", { opacity: 0, y: 50, duration: 1 });
gsap.from(".image img", { opacity: 0, x: 100, duration: 1 });
</script>

</body>
</html>
